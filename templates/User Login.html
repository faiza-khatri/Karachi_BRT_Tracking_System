<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Bus Karachi - Login</title>
    <style>
        :root { --main-red: #8B1A1A; --bg-gray: #F2F2F2; }
        body { font-family: sans-serif; background-color: white; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 90%; max-width: 400px; text-align: center; margin-top: 50px; }
        .logo { width: 80px; margin-bottom: 10px; }
        h1 { color: var(--main-red); font-size: 24px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; background: var(--bg-gray); box-sizing: border-box; }
        .login-btn { width: 100%; padding: 12px; background: var(--main-red); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/3448/3448339.png" class="logo" alt="Bus Logo">
        <h1>Red Bus <br> <small style="font-size: 14px; color: #333;">Karachi</small></h1>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button class="login-btn">Login</button>
    </div>
</body>
</html>
